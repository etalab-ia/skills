name: Sync datagouv skill
on:
  schedule:
    - cron: '0 9 * * 1'  # Lundi 9h UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - name: Check upstream
        id: check
        run: |
          git clone --depth=1 https://github.com/datagouv/datagouv-skill.git /tmp/upstream
          UPSTREAM_SHA=$(cd /tmp/upstream && git rev-parse HEAD)
          LOCAL_SHA=$(cat .sync-state/datagouv.sha 2>/dev/null || echo "")
          if [ "$UPSTREAM_SHA" != "$LOCAL_SHA" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Sync files
        if: steps.check.outputs.changed == 'true'
        run: |
          cp /tmp/upstream/SKILL.md skills/datagouv-apis/SKILL.md
          echo "${{ steps.check.outputs.sha }}" > .sync-state/datagouv.sha
      - name: Create PR
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="sync/datagouv-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add skills/datagouv-apis/SKILL.md .sync-state/datagouv.sha
          git commit -m "chore(datagouv): sync upstream changes"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(datagouv): sync upstream changes" \
            --body "Mise à jour automatique de la skill datagouv depuis [datagouv/datagouv-skill](https://github.com/datagouv/datagouv-skill).\n\nCommit upstream: ${{ steps.check.outputs.sha }}"
